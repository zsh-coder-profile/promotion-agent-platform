<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Agent Chat</title>
    <style>
        :root {
            --bg-root: #f7f3ea;
            --bg-muted: #f1ece2;
            --panel: rgba(250, 247, 241, 0.9);
            --panel-strong: #fcfaf5;
            --panel-soft: rgba(244, 238, 229, 0.94);
            --ink: #35302a;
            --muted: #81786d;
            --line: rgba(82, 69, 52, 0.14);
            --line-strong: rgba(123, 92, 61, 0.24);
            --accent: #88644a;
            --accent-strong: #644b39;
            --accent-soft: rgba(136, 100, 74, 0.1);
            --accent-warm: #af7d55;
            --user-bubble: linear-gradient(135deg, rgba(173, 149, 125, 0.08), rgba(95, 70, 49, 0.03));
            --assistant-bubble: #fcfaf5;
            --success: #5d7a5a;
            --danger: #b85c4b;
            --warning: #b07a3f;
            --shadow: 0 24px 60px rgba(74, 58, 40, 0.12);
            --shadow-soft: 0 14px 30px rgba(74, 58, 40, 0.08);
            --radius: 28px;
            --radius-md: 20px;
            --radius-sm: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                    radial-gradient(circle at top left, rgba(185, 154, 122, 0.18), transparent 30%),
                    radial-gradient(circle at right 16%, rgba(126, 104, 82, 0.12), transparent 24%),
                    linear-gradient(180deg, #faf7f2 0%, #efe9df 100%);
        }

        button, textarea {
            font: inherit;
        }

        .shell {
            width: min(1480px, calc(100% - 32px));
            margin: 16px auto;
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 18px;
            min-height: calc(100vh - 32px);
            align-items: stretch;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .sidebar {
            padding: 18px;
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .eyebrow {
            color: var(--accent);
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-weight: 600;
        }

        h1, h2, h3, p {
            margin: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.02;
            letter-spacing: -0.04em;
        }

        .meta,
        .hint,
        .status-meta {
            color: var(--muted);
        }

        .identity-list,
        .conversation-list,
        .message-list {
            display: grid;
            gap: 12px;
        }

        .identity-card,
        .conversation-item {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 14px 15px;
            background: rgba(255, 251, 245, 0.66);
            cursor: pointer;
            text-align: left;
            transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .identity-card:hover,
        .identity-card.active,
        .conversation-item:hover,
        .conversation-item.active {
            transform: translateY(-1px);
            border-color: var(--line-strong);
            box-shadow: 0 10px 22px rgba(98, 77, 55, 0.1);
        }

        .identity-role {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: var(--accent-soft);
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .sidebar-section {
            display: grid;
            gap: 12px;
        }

        .sidebar-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .sidebar-head h3 {
            font-size: 16px;
        }

        .workspace {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            min-height: calc(100vh - 36px);
            overflow: hidden;
        }

        .workspace-head {
            padding: 24px 28px 20px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            background:
                    radial-gradient(circle at top right, rgba(181, 144, 104, 0.12), transparent 36%),
                    linear-gradient(180deg, rgba(252, 250, 245, 0.96), rgba(248, 244, 236, 0.95));
        }

        .workspace-title {
            display: grid;
            gap: 10px;
        }

        .workspace-title h2 {
            font-size: 34px;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .workspace-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 250, 245, 0.84);
            color: var(--muted);
            font-size: 12px;
            font-weight: 500;
        }

        .badge {
            min-width: 280px;
            padding: 16px 18px;
            border-radius: 22px;
            border: 1px solid var(--line);
            background: rgba(252, 248, 242, 0.78);
            box-shadow: var(--shadow-soft);
        }

        .identity-summary-grid {
            display: grid;
            gap: 10px;
        }

        .identity-summary-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .identity-badge {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
        }

        .identity-summary-meta {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        .toolbar {
            padding: 12px 28px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: rgba(252, 248, 242, 0.72);
        }

        .toolbar-copy {
            display: grid;
            gap: 4px;
        }

        .toolbar-title {
            font-size: 14px;
            font-weight: 700;
        }

        .toolbar-desc {
            font-size: 13px;
            color: var(--muted);
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .workspace-body {
            min-height: 0;
            overflow: auto;
            padding: 24px 28px 32px;
            display: grid;
            align-content: start;
            background:
                    linear-gradient(180deg, rgba(255, 251, 246, 0.5), rgba(255, 251, 246, 0)),
                    var(--bg-muted);
        }

        .message-list {
            gap: 20px;
        }

        .message {
            display: grid;
            gap: 10px;
        }

        .message.user {
            justify-items: end;
        }

        .message.assistant {
            justify-items: start;
        }

        .message-meta {
            font-size: 12px;
            color: var(--muted);
            padding: 0 6px;
        }

        .bubble {
            width: min(100%, 980px);
            border-radius: 24px;
            border: 1px solid var(--line);
            padding: 18px 18px 16px;
            background: var(--assistant-bubble);
            box-shadow: 0 10px 24px rgba(74, 58, 40, 0.06);
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border-color: rgba(136, 100, 74, 0.12);
        }

        .message-text {
            white-space: pre-wrap;
            line-height: 1.65;
        }

        .message.user .message-text {
            font-weight: 450;
        }

        .assistant-blocks {
            display: grid;
            gap: 16px;
            width: 100%;
        }

        .report-shell {
            display: grid;
            gap: 16px;
        }

        .report-summary {
            display: grid;
            gap: 12px;
        }

        .summary-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(182, 146, 106, 0.1), rgba(252, 250, 245, 0.98));
        }

        .summary-title {
            font-size: 12px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-content {
            color: var(--ink);
            line-height: 1.75;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .metric-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: var(--panel-strong);
            display: grid;
            gap: 8px;
            min-height: 112px;
        }

        .metric-label {
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 30px;
            line-height: 1;
            letter-spacing: -0.04em;
            color: var(--accent-strong);
            font-weight: 600;
        }

        .metric-change {
            font-size: 13px;
            color: var(--success);
            font-weight: 500;
        }

        .metric-change.negative {
            color: var(--danger);
        }

        .chart-grid {
            display: grid;
            gap: 12px;
        }

        .chart-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel-strong);
            overflow: hidden;
        }

        .chart-card header {
            padding: 13px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: rgba(138, 90, 54, 0.05);
        }

        .chart-body {
            padding: 18px 16px 20px;
            display: grid;
            gap: 16px;
        }

        .chart-svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .chart-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .chart-legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            flex: 0 0 auto;
        }

        .chart-legend-text {
            min-width: 0;
            font-size: 12px;
            line-height: 1.4;
            color: var(--muted);
        }

        .chart-empty {
            padding: 28px 14px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--line);
            border-radius: 16px;
            background: rgba(138, 90, 54, 0.04);
        }

        .result-card {
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: var(--panel-strong);
            box-shadow: var(--shadow-soft);
        }

        .result-card header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(95, 70, 49, 0.04);
        }

        pre {
            margin: 0;
            padding: 16px;
            overflow: auto;
            background: #2f2721;
            color: #f7f1e8;
            font-family: "Space Mono", "SFMono-Regular", Consolas, monospace;
            font-size: 13px;
            line-height: 1.55;
        }

        .table-wrap {
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fcfaf5;
        }

        th, td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            font-size: 14px;
            vertical-align: top;
        }

        th {
            background: rgba(138, 90, 54, 0.08);
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .empty {
            padding: 24px 18px;
            color: var(--muted);
            text-align: center;
            border: 1px dashed var(--line);
            border-radius: 18px;
            background: rgba(252, 249, 243, 0.72);
        }

        .composer {
            padding: 18px 28px 24px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 12px;
            background: rgba(250, 246, 239, 0.9);
        }

        .composer-shell {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: #fcfaf5;
            box-shadow: var(--shadow-soft);
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 96px;
            resize: vertical;
            padding: 12px 14px;
            border-radius: 20px;
            border: 0;
            background: transparent;
            color: var(--ink);
            outline: none;
        }

        textarea:focus {
            box-shadow: none;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 11px 18px;
            cursor: pointer;
            transition: transform 160ms ease, opacity 160ms ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .primary {
            background: rgba(100, 75, 57, 0.94);
            color: #fbf7f0;
            box-shadow: 0 8px 20px rgba(100, 75, 57, 0.16);
        }

        .secondary {
            background: rgba(251, 247, 240, 0.88);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .ghost {
            background: rgba(136, 100, 74, 0.06);
            color: var(--accent-strong);
            border-color: rgba(136, 100, 74, 0.12);
        }

        .status {
            min-height: 22px;
            color: var(--muted);
            font-size: 14px;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--danger);
        }

        .status.running {
            color: var(--accent-strong);
        }

        .sidebar-toggle {
            display: none;
        }

        .mini-sidebar {
            display: none;
        }

        .conversation-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .conversation-preview {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.45;
        }

        .loading {
            opacity: 0.65;
        }

        @media (max-width: 1200px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .workspace {
                min-height: auto;
            }

            .sidebar {
                display: none;
            }

            .mini-sidebar {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .sidebar-toggle {
                display: inline-flex;
            }

            .shell.show-sidebar .sidebar {
                display: grid;
                position: fixed;
                top: 16px;
                left: 16px;
                bottom: 16px;
                width: min(360px, calc(100vw - 32px));
                z-index: 10;
            }

            .shell.show-sidebar::after {
                content: "";
                position: fixed;
                inset: 0;
                background: rgba(2, 12, 27, 0.36);
                z-index: 9;
            }
        }

        @media (max-width: 860px) {
            .workspace-head,
            .workspace-body,
            .composer,
            .toolbar {
                padding-left: 18px;
                padding-right: 18px;
            }

            .workspace-head {
                grid-template-columns: 1fr;
                display: grid;
            }

            .badge {
                min-width: 0;
                width: 100%;
            }

            .workspace-title h2 {
                font-size: 28px;
            }

            .metrics-grid {
                grid-template-columns: 1fr 1fr;
            }

            .bubble {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100%, calc(100% - 16px));
                margin: 8px auto;
                min-height: calc(100vh - 16px);
            }

            .panel {
                border-radius: 22px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .toolbar-actions,
            .button-group,
            .actions {
                width: 100%;
            }

            .actions {
                align-items: stretch;
            }

            .button-group {
                justify-content: stretch;
            }

            .button-group button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <aside class="panel sidebar">
        <div class="sidebar-section">
            <div class="eyebrow">Analyst Console</div>
            <h1>SQL Insight Workspace</h1>
            <p class="meta">弱化操作台感，强化对话中的数据洞察与报表式结果呈现。</p>
        </div>

        <section class="sidebar-section">
            <div class="sidebar-head">
                <h3>身份预设</h3>
            </div>
            <div class="identity-list" id="identityList"></div>
        </section>

        <section class="sidebar-section">
            <div class="sidebar-head">
                <h3>会话列表</h3>
                <button class="secondary" id="sidebarNewConversationButton" type="button">新增对话</button>
            </div>
            <div class="conversation-list" id="conversationList"></div>
        </section>
    </aside>

    <main class="panel workspace">
        <section class="workspace-head">
            <div class="workspace-title">
                <div class="mini-sidebar">
                    <button class="secondary sidebar-toggle" id="sidebarToggleButton" type="button">会话面板</button>
                    <div class="eyebrow">Conversation</div>
                </div>
                <div class="eyebrow">Conversation</div>
                <h2 id="conversationTitle">新对话</h2>
                <div class="meta">以对话推进查询，用报表化结果承接 SQL、指标和数据明细。</div>
                <div class="workspace-meta">
                    <span class="chip">API · <code>/api/sql/conversations</code></span>
                    <span class="chip">模式 · Chat + Report</span>
                    <span class="chip">支持 · SQL / Rows / 可选 Metrics / Charts</span>
                </div>
            </div>
            <div class="badge" id="identitySummary"></div>
        </section>

        <section class="toolbar">
            <div class="toolbar-copy">
                <div class="toolbar-title">当前工作流</div>
                <div class="toolbar-desc">先提问，再逐轮沉淀 SQL、摘要、指标和结果表。</div>
            </div>
            <div class="toolbar-actions">
                <button class="secondary" id="newConversationButton" type="button">新增对话</button>
                <button class="ghost" id="fillExampleButton" type="button">填入示例问题</button>
            </div>
        </section>

        <section class="workspace-body" id="messageViewport">
            <div class="message-list" id="messageList"></div>
        </section>

        <section class="composer">
            <div class="composer-shell">
                <textarea id="questionInput" placeholder="例如：帮我看下本月订单金额最高的前 5 个门店，然后继续问这些门店里订单数最低的是哪一家"></textarea>
                <div class="actions">
                    <div class="status" id="statusText"></div>
                    <div class="button-group">
                        <button class="primary" id="sendButton" type="button">发送问题</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
 </div>

<script>
    const identities = [
        { label: "华东租户运营", userId: "ops-east-01", tenantId: "1", role: "USER" },
        { label: "华南租户运营", userId: "ops-south-01", tenantId: "2", role: "USER" },
        { label: "平台管理员", userId: "platform-admin", tenantId: "", role: "ADMIN" }
    ];

    const state = {
        selectedIdentity: identities[0],
        conversations: [],
        activeConversationId: null,
        activeConversation: null,
        loading: false
    };

    const shell = document.querySelector(".shell");
    const identityList = document.getElementById("identityList");
    const identitySummary = document.getElementById("identitySummary");
    const conversationList = document.getElementById("conversationList");
    const sidebarToggleButton = document.getElementById("sidebarToggleButton");
    const sidebarNewConversationButton = document.getElementById("sidebarNewConversationButton");
    const newConversationButton = document.getElementById("newConversationButton");
    const conversationTitle = document.getElementById("conversationTitle");
    const messageList = document.getElementById("messageList");
    const messageViewport = document.getElementById("messageViewport");
    const questionInput = document.getElementById("questionInput");
    const fillExampleButton = document.getElementById("fillExampleButton");
    const sendButton = document.getElementById("sendButton");
    const statusText = document.getElementById("statusText");

    function currentHeaders() {
        const current = state.selectedIdentity;
        return {
            "Content-Type": "application/json",
            "X-User-Id": current.userId,
            "X-Tenant-Id": current.tenantId,
            "X-User-Role": current.role
        };
    }

    function setStatus(message, type = "") {
        statusText.textContent = message;
        statusText.className = "status" + (type ? ` ${type}` : "");
    }

    function setLoading(loading) {
        state.loading = loading;
        sendButton.disabled = loading;
        newConversationButton.disabled = loading;
        sidebarNewConversationButton.disabled = loading;
        conversationList.classList.toggle("loading", loading);
    }

    function renderIdentityCards() {
        identityList.innerHTML = "";
        identities.forEach(identity => {
            const card = document.createElement("button");
            card.type = "button";
            card.className = "identity-card" + (identity === state.selectedIdentity ? " active" : "");
            card.innerHTML = `
                <div class="identity-role">${identity.role}</div>
                <div><strong>${identity.label}</strong></div>
                <div class="meta">userId: ${identity.userId}</div>
                <div class="meta">${identity.role === "ADMIN" ? "全局可见，无租户限制" : `租户自动注入: ${identity.tenantId}`}</div>
            `;
            card.addEventListener("click", async () => {
                state.selectedIdentity = identity;
                renderIdentityCards();
                renderIdentitySummary();
                await loadConversations(true);
            });
            identityList.appendChild(card);
        });
    }

    function renderIdentitySummary() {
        const current = state.selectedIdentity;
        identitySummary.innerHTML = `
            <div class="identity-summary-grid">
                <div class="identity-summary-main">
                    <strong>${current.label}</strong>
                    <span class="identity-badge">${current.role}</span>
                </div>
                <div class="identity-summary-meta">
                    <div>userId: ${current.userId}</div>
                    <div>${current.role === "ADMIN" ? "租户范围: 全局可见" : `租户范围: ${current.tenantId}`}</div>
                    <div>${current.role === "ADMIN" ? "可用于跨租户排查与全局分析" : "结果会自动附带租户访问上下文"}</div>
                </div>
            </div>
        `;
    }

    function formatTimestamp(value) {
        if (!value) {
            return "";
        }
        const normalized = value.replace(" ", "T");
        const date = new Date(normalized);
        return Number.isNaN(date.getTime()) ? value : date.toLocaleString("zh-CN", { hour12: false });
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }

    function renderConversationList() {
        if (!state.conversations.length) {
            conversationList.innerHTML = `<div class="empty">还没有对话，点“新增对话”开始。</div>`;
            return;
        }

        conversationList.innerHTML = "";
        state.conversations.forEach(item => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "conversation-item" + (item.id === state.activeConversationId ? " active" : "");
            button.innerHTML = `
                <div class="conversation-title">${escapeHtml(item.title || "新对话")}</div>
                <div class="conversation-preview">${escapeHtml(item.lastQuestion || "还没有发送消息")}</div>
                <div class="status-meta">${escapeHtml(formatTimestamp(item.updatedAt))}</div>
            `;
            button.addEventListener("click", () => loadConversation(item.id));
            conversationList.appendChild(button);
        });
    }

    function renderRowsTable(rows) {
        if (!rows || !rows.length) {
            return `<div class="empty">本轮没有结果数据。</div>`;
        }
        const columns = Object.keys(rows[0]);
        const thead = `<thead><tr>${columns.map(column => `<th>${escapeHtml(column)}</th>`).join("")}</tr></thead>`;
        const tbody = `<tbody>${rows.map(row => `<tr>${columns.map(column => `<td>${escapeHtml(row[column])}</td>`).join("")}</tr>`).join("")}</tbody>`;
        return `<div class="table-wrap"><table>${thead}${tbody}</table></div>`;
    }

    function normalizeMetric(metric, index) {
        if (metric == null) {
            return {
                label: `指标 ${index + 1}`,
                value: "--",
                change: ""
            };
        }
        if (typeof metric !== "object") {
            return {
                label: `指标 ${index + 1}`,
                value: metric,
                change: ""
            };
        }
        return {
            label: metric.label || metric.name || metric.title || `指标 ${index + 1}`,
            value: metric.value ?? metric.amount ?? metric.total ?? "--",
            change: metric.change || metric.delta || metric.trend || ""
        };
    }

    function renderMetrics(metrics) {
        if (!Array.isArray(metrics) || !metrics.length) {
            return "";
        }
        return `
            <section class="metrics-grid">
                ${metrics.map((metric, index) => {
                    const normalized = normalizeMetric(metric, index);
                    const change = String(normalized.change || "");
                    const changeClass = change.includes("-") || change.toLowerCase().includes("down") ? "negative" : "";
                    return `
                        <article class="metric-card">
                            <div class="metric-label">${escapeHtml(normalized.label)}</div>
                            <div class="metric-value">${escapeHtml(normalized.value)}</div>
                            <div class="metric-change ${changeClass}">${escapeHtml(change || "已生成关键指标摘要")}</div>
                        </article>
                    `;
                }).join("")}
            </section>
        `;
    }

    function normalizeChartPoint(point, index) {
        if (point && typeof point === "object") {
            return {
                label: point.label || point.name || point.x || `项 ${index + 1}`,
                value: Number(point.value ?? point.y ?? point.amount ?? point.total ?? 0)
            };
        }
        return {
            label: `项 ${index + 1}`,
            value: Number(point || 0)
        };
    }

    function clampNumber(value, fallback = 0) {
        const numeric = Number(value);
        return Number.isFinite(numeric) ? numeric : fallback;
    }

    function compactLabel(value, maxLength = 18) {
        const text = String(value ?? "");
        return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
    }

    function getChartPalette(index) {
        const palette = [
            "#8a5a36",
            "#b07a3f",
            "#6e6254",
            "#a07d5a",
            "#92715a",
            "#5f4631",
            "#c09566",
            "#7d6a58"
        ];
        return palette[index % palette.length];
    }

    function buildChartDataset(chart) {
        if (Array.isArray(chart?.data) && chart.data.length) {
            return chart.data.map(normalizeChartPoint).filter(point => Number.isFinite(point.value));
        }
        return [];
    }

    function inferChartFromRows(rows, sqlText) {
        if (!Array.isArray(rows) || !rows.length) {
            return null;
        }
        const columns = Object.keys(rows[0] || {});
        if (columns.length < 2) {
            return null;
        }

        const numericColumn = columns.find(column => rows.some(row => Number.isFinite(Number(row[column]))));
        const labelColumn = columns.find(column => column !== numericColumn);
        if (!numericColumn || !labelColumn) {
            return null;
        }

        const data = rows.slice(0, 8).map((row, index) => ({
            label: row[labelColumn] ?? `项 ${index + 1}`,
            value: clampNumber(row[numericColumn], 0)
        })).filter(point => Number.isFinite(point.value));

        if (!data.length) {
            return null;
        }

        const lowerSql = String(sqlText || "").toLowerCase();
        const isTrend = /date|day|month|time|hour|week/.test(labelColumn.toLowerCase()) || /group by/.test(lowerSql);
        return {
            title: `${compactLabel(labelColumn)} vs ${compactLabel(numericColumn)}`,
            type: isTrend ? "line" : "bar",
            data
        };
    }

    function renderBarChartSvg(data) {
        if (!data.length) {
            return `<div class="chart-empty">没有可用于渲染柱状图的数据。</div>`;
        }

        const width = 720;
        const height = 320;
        const margin = { top: 18, right: 18, bottom: 78, left: 52 };
        const plotWidth = width - margin.left - margin.right;
        const plotHeight = height - margin.top - margin.bottom;
        const maxValue = Math.max(...data.map(item => item.value), 1);
        const barWidth = Math.max(28, Math.min(76, plotWidth / Math.max(data.length, 1) - 12));
        const gap = (plotWidth - barWidth * data.length) / Math.max(data.length - 1, 1);
        const zeroY = margin.top + plotHeight;

        const gridLines = Array.from({ length: 5 }, (_, idx) => {
            const value = maxValue * (idx / 4);
            const y = zeroY - (value / maxValue) * plotHeight;
            return `
                <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(95,70,49,0.12)" stroke-width="1" />
                <text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#746b5f">${Math.round(value)}</text>
            `;
        }).join("");

        const bars = data.map((item, idx) => {
            const x = margin.left + idx * (barWidth + gap);
            const barHeight = (item.value / maxValue) * plotHeight;
            const y = zeroY - barHeight;
            const color = getChartPalette(idx);
            return `
                <g>
                    <rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="10" fill="${color}" opacity="0.92"></rect>
                    <text x="${x + barWidth / 2}" y="${Math.max(y - 8, 12)}" text-anchor="middle" font-size="11" fill="#5f4631" font-weight="700">${escapeHtml(item.value)}</text>
                    <text x="${x + barWidth / 2}" y="${height - 24}" text-anchor="middle" font-size="11" fill="#746b5f">${escapeHtml(compactLabel(item.label, 12))}</text>
                </g>
            `;
        }).join("");

        return `
            <article class="chart-card">
                <header>
                    <strong>图表预览</strong>
                    <span class="hint">bar</span>
                </header>
                <div class="chart-body">
                    <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="bar chart">
                        ${gridLines}
                        <line x1="${margin.left}" y1="${zeroY}" x2="${width - margin.right}" y2="${zeroY}" stroke="rgba(95,70,49,0.2)" stroke-width="1.5" />
                        ${bars}
                    </svg>
                    <div class="chart-legend">
                        ${data.map((item, idx) => `
                            <div class="chart-legend-item">
                                <span class="chart-legend-swatch" style="background:${getChartPalette(idx)}"></span>
                                <span class="chart-legend-text">${escapeHtml(item.label)} · ${escapeHtml(item.value)}</span>
                            </div>
                        `).join("")}
                    </div>
                </div>
            </article>
        `;
    }

    function renderLineChartSvg(data) {
        if (!data.length) {
            return `<div class="chart-empty">没有可用于渲染折线图的数据。</div>`;
        }

        const width = 720;
        const height = 300;
        const margin = { top: 20, right: 20, bottom: 64, left: 50 };
        const plotWidth = width - margin.left - margin.right;
        const plotHeight = height - margin.top - margin.bottom;
        const maxValue = Math.max(...data.map(item => item.value), 1);
        const minValue = Math.min(...data.map(item => item.value), 0);
        const range = Math.max(maxValue - minValue, 1);
        const xStep = data.length > 1 ? plotWidth / (data.length - 1) : plotWidth / 2;
        const zeroY = margin.top + plotHeight;

        const points = data.map((item, idx) => {
            const x = margin.left + (data.length > 1 ? idx * xStep : plotWidth / 2);
            const y = zeroY - ((item.value - minValue) / range) * plotHeight;
            return { ...item, x, y };
        });

        const path = points.map((point, idx) => `${idx === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
        const areaPath = `${path} L ${points[points.length - 1].x} ${zeroY} L ${points[0].x} ${zeroY} Z`;
        const gridLines = Array.from({ length: 5 }, (_, idx) => {
            const value = minValue + (range * idx) / 4;
            const y = zeroY - ((value - minValue) / range) * plotHeight;
            return `
                <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="rgba(95,70,49,0.12)" stroke-width="1" />
                <text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="#746b5f">${Math.round(value)}</text>
            `;
        }).join("");

        return `
            <article class="chart-card">
                <header>
                    <strong>图表预览</strong>
                    <span class="hint">line</span>
                </header>
                <div class="chart-body">
                    <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="line chart">
                        ${gridLines}
                        <path d="${areaPath}" fill="rgba(176,122,63,0.12)"></path>
                        <path d="${path}" fill="none" stroke="#8a5a36" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                        ${points.map((point, idx) => `
                            <g>
                                <circle cx="${point.x}" cy="${point.y}" r="5" fill="${getChartPalette(idx)}" stroke="#ffffff" stroke-width="2"></circle>
                                <text x="${point.x}" y="${point.y - 12}" text-anchor="middle" font-size="11" fill="#5f4631" font-weight="700">${escapeHtml(point.value)}</text>
                                <text x="${point.x}" y="${height - 20}" text-anchor="middle" font-size="11" fill="#746b5f">${escapeHtml(compactLabel(point.label, 12))}</text>
                            </g>
                        `).join("")}
                    </svg>
                </div>
            </article>
        `;
    }

    function renderDonutChartSvg(data) {
        if (!data.length) {
            return `<div class="chart-empty">没有可用于渲染环形图的数据。</div>`;
        }

        const width = 720;
        const height = 320;
        const cx = 200;
        const cy = 160;
        const radius = 94;
        const innerRadius = 56;
        const total = Math.max(data.reduce((sum, item) => sum + Math.max(0, item.value), 0), 1);
        let currentAngle = -Math.PI / 2;

        const arcs = data.map((item, idx) => {
            const value = Math.max(0, item.value);
            const angle = (value / total) * Math.PI * 2;
            const startAngle = currentAngle;
            const endAngle = currentAngle + angle;
            currentAngle = endAngle;

            const x1 = cx + radius * Math.cos(startAngle);
            const y1 = cy + radius * Math.sin(startAngle);
            const x2 = cx + radius * Math.cos(endAngle);
            const y2 = cy + radius * Math.sin(endAngle);
            const ix1 = cx + innerRadius * Math.cos(endAngle);
            const iy1 = cy + innerRadius * Math.sin(endAngle);
            const ix2 = cx + innerRadius * Math.cos(startAngle);
            const iy2 = cy + innerRadius * Math.sin(startAngle);
            const largeArcFlag = angle > Math.PI ? 1 : 0;
            const color = getChartPalette(idx);

            return `
                <path
                    d="M ${x1} ${y1}
                       A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}
                       L ${ix1} ${iy1}
                       A ${innerRadius} ${innerRadius} 0 ${largeArcFlag} 0 ${ix2} ${iy2}
                       Z"
                    fill="${color}">
                </path>
            `;
        }).join("");

        return `
            <article class="chart-card">
                <header>
                    <strong>图表预览</strong>
                    <span class="hint">donut</span>
                </header>
                <div class="chart-body">
                    <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="donut chart">
                        ${arcs}
                        <circle cx="${cx}" cy="${cy}" r="${innerRadius - 2}" fill="#ffffff"></circle>
                        <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="16" fill="#746b5f">Total</text>
                        <text x="${cx}" y="${cy + 22}" text-anchor="middle" font-size="28" font-weight="700" fill="#5f4631">${escapeHtml(total)}</text>
                    </svg>
                    <div class="chart-legend">
                        ${data.map((item, idx) => `
                            <div class="chart-legend-item">
                                <span class="chart-legend-swatch" style="background:${getChartPalette(idx)}"></span>
                                <span class="chart-legend-text">${escapeHtml(item.label)} · ${escapeHtml(item.value)}</span>
                            </div>
                        `).join("")}
                    </div>
                </div>
            </article>
        `;
    }

    function renderChartCard(chart, index) {
        const type = String(chart?.type || "").toLowerCase();
        const data = buildChartDataset(chart);
        const normalized = {
            title: chart?.title || chart?.name || `图表 ${index + 1}`,
            type: type || "bar",
            data
        };

        let body = "";
        if (normalized.type.includes("line")) {
            body = renderLineChartSvg(normalized.data);
        } else if (normalized.type.includes("pie") || normalized.type.includes("donut")) {
            body = renderDonutChartSvg(normalized.data);
        } else {
            body = renderBarChartSvg(normalized.data);
        }

        return body
            .replace("<strong>图表预览</strong>", `<strong>${escapeHtml(normalized.title)}</strong>`)
            .replace(`>${normalized.type.includes("line") ? "line" : normalized.type.includes("pie") || normalized.type.includes("donut") ? "donut" : "bar"}<`, `>${escapeHtml(normalized.type)}<`);
    }

    function renderCharts(charts, fallbackChart = null) {
        const chartList = Array.isArray(charts) && charts.length ? charts : (fallbackChart ? [fallbackChart] : []);
        if (!chartList.length) {
            return "";
        }
        return `
            <section class="chart-grid">
                ${chartList.map((chart, index) => renderChartCard(chart, index)).join("")}
            </section>
        `;
    }

    function renderSummary(summary, assistantText) {
        const content = summary || assistantText;
        if (!content) {
            return "";
        }
        return `
            <section class="report-summary">
                <article class="summary-card">
                    <div class="summary-title">Analysis Summary</div>
                    <div class="summary-content">${escapeHtml(content)}</div>
                </article>
            </section>
        `;
    }

    function renderAssistantReport(message) {
        const assistantText = message.answerText || (message.status === "ERROR" ? "查询失败。" : "查询已完成。");
        const summaryBlock = renderSummary(message.summary, assistantText);
        const metricsBlock = renderMetrics(message.metrics);
        const inferredChart = !message.charts?.length && message.status !== "ERROR"
            ? inferChartFromRows(message.rows || [], message.sqlText || "")
            : null;
        const chartsBlock = renderCharts(message.charts, inferredChart);
        const sqlBlock = message.sqlText ? `
            <section class="result-card">
                <header>
                    <strong>生成 SQL</strong>
                    <span class="hint">${escapeHtml((message.rowCount || 0) + " rows")}</span>
                </header>
                <pre>${escapeHtml(message.sqlText)}</pre>
            </section>
        ` : "";
        const rowsBlock = message.status === "ERROR"
            ? `<section class="result-card"><header><strong>错误信息</strong></header><div class="empty">${escapeHtml(message.errorMessage || "执行失败")}</div></section>`
            : `<section class="result-card"><header><strong>查询结果</strong><span class="hint">${escapeHtml((message.rowCount || 0) + " rows")}</span></header>${renderRowsTable(message.rows || [])}</section>`;

        return `
            <div class="report-shell">
                ${summaryBlock}
                ${metricsBlock}
                ${chartsBlock}
                ${sqlBlock}
                ${rowsBlock}
            </div>
        `;
    }

    function renderMessages() {
        if (!state.activeConversation) {
            conversationTitle.textContent = "新对话";
            messageList.innerHTML = `<div class="empty">先创建一个对话，再开始提问。</div>`;
            return;
        }

        const { conversation, messages } = state.activeConversation;
        conversationTitle.textContent = conversation.title || "新对话";

        if (!messages || !messages.length) {
            messageList.innerHTML = `<div class="empty">这个会话还没有消息，输入问题开始查询。</div>`;
            return;
        }

        messageList.innerHTML = messages.map(message => {
            if (message.role === "USER") {
                return `
                    <article class="message user">
                        <div class="message-meta">用户 · ${escapeHtml(formatTimestamp(message.createdAt))}</div>
                        <div class="bubble">
                            <div class="message-text">${escapeHtml(message.question || "")}</div>
                        </div>
                    </article>
                `;
            }

            return `
                <article class="message assistant">
                    <div class="message-meta">助手 · ${escapeHtml(formatTimestamp(message.createdAt))}</div>
                    <div class="bubble">
                        <div class="assistant-blocks">
                            ${renderAssistantReport(message)}
                        </div>
                    </div>
                </article>
            `;
        }).join("");

        requestAnimationFrame(() => {
            messageViewport.scrollTop = messageViewport.scrollHeight;
        });
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            ...options,
            headers: {
                ...currentHeaders(),
                ...(options.headers || {})
            }
        });
        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload.message || "请求失败");
        }
        return payload;
    }

    async function loadConversations(autoSelectFirst = false) {
        setLoading(true);
        try {
            state.conversations = await requestJson("/api/sql/conversations", { method: "GET" });
            renderConversationList();

            if (!state.conversations.length) {
                state.activeConversationId = null;
                state.activeConversation = null;
                renderMessages();
                setStatus("当前身份还没有历史会话。", "");
                return;
            }

            const nextId = autoSelectFirst
                ? state.conversations[0].id
                : (state.activeConversationId && state.conversations.some(item => item.id === state.activeConversationId)
                    ? state.activeConversationId
                    : state.conversations[0].id);
            await loadConversation(nextId, false);
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    async function loadConversation(conversationId, updateStatus = true) {
        if (!conversationId) {
            return;
        }
        try {
            state.activeConversation = await requestJson(`/api/sql/conversations/${conversationId}`, { method: "GET" });
            state.activeConversationId = conversationId;
            renderConversationList();
            renderMessages();
            if (updateStatus) {
                setStatus("已切换到历史会话。", "");
            }
            shell.classList.remove("show-sidebar");
        } catch (error) {
            setStatus(error.message, "error");
        }
    }

    async function createConversation() {
        setLoading(true);
        try {
            state.activeConversation = await requestJson("/api/sql/conversations", {
                method: "POST"
            });
            state.activeConversationId = state.activeConversation.conversation.id;
            state.conversations = [state.activeConversation.conversation, ...state.conversations];
            renderConversationList();
            renderMessages();
            setStatus("已创建新对话。", "success");
            questionInput.focus();
            shell.classList.remove("show-sidebar");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    async function submitQuestion() {
        const question = questionInput.value.trim();
        if (!question) {
            setStatus("先输入一个问题。", "error");
            return;
        }

        if (!state.activeConversationId) {
            await createConversation();
        }

        setLoading(true);
        setStatus("SQL Agent 正在分析会话上下文并生成报表式结果...", "running");

        try {
            state.activeConversation = await requestJson(`/api/sql/conversations/${state.activeConversationId}/messages`, {
                method: "POST",
                body: JSON.stringify({ question })
            });
            questionInput.value = "";
            await refreshConversationSummary();
            renderConversationList();
            renderMessages();
            setStatus("本轮对话已保存。", "success");
        } catch (error) {
            setStatus(error.message, "error");
        } finally {
            setLoading(false);
        }
    }

    async function refreshConversationSummary() {
        state.conversations = await requestJson("/api/sql/conversations", { method: "GET" });
        const active = state.conversations.find(item => item.id === state.activeConversationId);
        if (active && state.activeConversation) {
            state.activeConversation.conversation = active;
        }
    }

    fillExampleButton.addEventListener("click", () => {
        questionInput.value = "帮我看下本月订单金额最高的前 5 个门店";
        questionInput.focus();
    });

    sidebarToggleButton?.addEventListener("click", () => {
        shell.classList.toggle("show-sidebar");
    });

    sidebarNewConversationButton.addEventListener("click", createConversation);
    newConversationButton.addEventListener("click", createConversation);
    sendButton.addEventListener("click", submitQuestion);
    questionInput.addEventListener("keydown", event => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
            submitQuestion();
        }
    });

    async function bootstrap() {
        renderIdentityCards();
        renderIdentitySummary();
        await loadConversations(true);
    }

    bootstrap();
</script>
</body>
</html>
